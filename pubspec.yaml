  swipe_to: ^1.0.6
  photo_view: ^0.15.0
  dotted_border: ^3.1.0
  flutter_webrtc: ^1.3.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  emoji_picker_flutter: ^4.4.0
  shamsi_date:
  audio_waveforms: ^2.0.2
  socket_io_client: ^3.1.4
  flutter_tts: ^4.2.5
  voice_note_kit: ^1.3.3
  get_storage: ^2.1.1
  font_awesome_flutter: ^10.12.0
  story_view:
#  just_audio: ^0.10.4
  http_parser:
  visibility_detector:
  just_audio_background: any
#  flutter_stripe:
#  telegram_web_app: ^0.3.3
#  flutter_telegram_miniapp: ^0.0.10


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true


  assets:
    - assets/images/
    - assets/fonts/
    - assets/anim/
    - assets/locales/

  fonts:
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SF-Pro-Display-Ultralight.otf
          weight: 100
        - asset: assets/fonts/SF-Pro-Display-Thin.otf
          weight: 200
        - asset: assets/fonts/SF-Pro-Display-Light.otf
          weight: 300
        - asset: assets/fonts/SF-Pro-Display-Regular.otf
          weight: 400
        - asset: assets/fonts/SF-Pro-Display-Medium.otf
          weight: 500
        - asset: assets/fonts/SF-Pro-Display-Semibold.otf
          weight: 600
        - asset: assets/fonts/SF-Pro-Display-Bold.otf
          weight: 700
        - asset: assets/fonts/SF-Pro-Display-Heavy.otf
          weight: 800
        - asset: assets/fonts/SF-Pro-Display-Black.otf
          weight: 900


icons_launcher:
  image_path: "assets/images/logo.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true
    web:
      enable: true


flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    icon_background_color: "#ffffff"
    image_dark: assets/images/logo.png
    icon_background_color_dark: "#ffffff"
  ios: true
  web: true
