  flutter_staggered_grid_view: ^0.7.0
  open_file: ^3.5.11
  share_plus: ^12.0.1
  flutter_typeahead: ^5.2.0
  toln: ^0.0.3
  firebase_messaging: ^16.1.1
  firebase_core: ^4.4.0
  fast_cached_network_image: ^1.3.3+5
